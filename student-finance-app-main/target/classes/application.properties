spring.application.name=student-finance-app

# =============================================
# KONEKSI DATABASE MYSQL (XAMPP)
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/student_finance_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
# update = tabel otomatis dibuat/disesuaikan dari class @Entity kita
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =============================================
# THYMELEAF
# =============================================
spring.thymeleaf.cache=false