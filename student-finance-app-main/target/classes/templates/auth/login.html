<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi Keuangan Mahasiswa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.5rem; color: #1a202c; margin-bottom: 0.25rem; }
        p.sub { color: #718096; font-size: 0.9rem; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #4a5568; margin-bottom: 0.3rem; }
        input, select {
            width: 100%; padding: 0.65rem 0.9rem;
            border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 0.95rem; margin-bottom: 1rem;
        }
        input:focus, select:focus { outline: none; border-color: #4299e1; }
        button {
            width: 100%; padding: 0.75rem;
            background: #4299e1; color: white;
            border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #3182ce; }
        .alert-error {
            background: #fff5f5; border: 1px solid #feb2b2;
            color: #c53030; border-radius: 8px;
            padding: 0.75rem; margin-bottom: 1rem; font-size: 0.9rem;
        }
        .alert-sukses {
            background: #f0fff4; border: 1px solid #9ae6b4;
            color: #276749; border-radius: 8px;
            padding: 0.75rem; margin-bottom: 1rem; font-size: 0.9rem;
        }
        .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #718096; }
        .link a { color: #4299e1; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <h1>Selamat Datang</h1>
    <p class="sub">Aplikasi Pencatatan Keuangan Mahasiswa &mdash; Kelompok 6</p>

    <div class="alert-error" th:if="${error}" th:text="${error}"></div>
    <div class="alert-sukses" th:if="${sukses}" th:text="${sukses}"></div>

    <form th:action="@{/auth/login}" method="post">
        <label for="tipeUser">Login sebagai</label>
        <select id="tipeUser" name="tipeUser" onchange="ubahLabel()">
            <option value="mahasiswa">Mahasiswa</option>
            <option value="orangtua">Orang Tua</option>
        </select>

        <label id="labelIdentifier" for="identifier">Email Kampus</label>
        <input type="text" id="identifier" name="identifier"
               placeholder="email@student.ac.id" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Masukkan password" required />

        <button type="submit">Masuk</button>
    </form>

    <div class="link">
        Belum punya akun? <a th:href="@{/auth/daftar}">Daftar di sini</a>
    </div>
</div>

<script>
    function ubahLabel() {
        const tipe = document.getElementById('tipeUser').value;
        const label = document.getElementById('labelIdentifier');
        const input = document.getElementById('identifier');
        if (tipe === 'orangtua') {
            label.textContent = 'Nomor HP';
            input.placeholder = '08123456789';
        } else {
            label.textContent = 'Email Kampus';
            input.placeholder = 'email@student.ac.id';
        }
    }
</script>
</body>
</html>
