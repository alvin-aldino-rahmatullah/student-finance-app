<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil - Aplikasi Keuangan Mahasiswa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="navbar">
      <div class="brand"><h2>Profil Saya</h2></div>
      <div class="actions">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/auth/logout}">Logout</a>
      </div>
    </div>

    <div class="container narrow">
      <!-- EDIT PROFIL -->
      <div class="card form-card" style="margin-top: 2rem">
        <h3>Edit Profil</h3>

        <div class="alert error" th:if="${error}" th:text="${error}"></div>
        <div class="alert success" th:if="${sukses}" th:text="${sukses}"></div>

        <form th:action="@{/auth/profil/edit}" method="post">
          <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="nama" th:value="${user.nama}" required />
          </div>

          <div class="form-group">
            <label>Nomor HP</label>
            <input type="text" name="noHP" th:value="${user.noHP}" required />
          </div>

          <div
            class="form-group"
            th:if="${user instanceof T(com.financetracker.student_finance_app.model.Mahasiswa)}"
          >
            <label>Email Kampus</label>
            <input
              type="email"
              name="email"
              th:value="${user.email}"
              required
            />
          </div>

          <input
            type="hidden"
            name="email"
            th:value="${user.noHP}"
            th:if="${!(user instanceof T(com.financetracker.student_finance_app.model.Mahasiswa))}"
          />

          <button type="submit" class="btn btn-primary">
            Simpan Perubahan
          </button>
        </form>
      </div>

      <!-- GANTI PASSWORD -->
      <div class="card form-card">
        <h3>Ganti Password</h3>

        <div
          class="alert error"
          th:if="${errorPassword}"
          th:text="${errorPassword}"
        ></div>
        <div
          class="alert success"
          th:if="${suksesPassword}"
          th:text="${suksesPassword}"
        ></div>

        <form th:action="@{/auth/profil/ganti-password}" method="post">
          <div class="form-group">
            <label>Password Lama</label>
            <input
              type="password"
              name="passwordLama"
              placeholder="Masukkan password lama"
              required
            />
          </div>

          <div class="form-group">
            <label>Password Baru</label>
            <input
              type="password"
              name="passwordBaru"
              placeholder="Masukkan password baru"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary">Ganti Password</button>
        </form>
      </div>

      <!-- HAPUS AKUN -->
      <div class="card">
        <h3>Hapus Akun</h3>
        <div class="hapus-section">
          <p>
            Tindakan ini permanen dan tidak bisa dibatalkan. Seluruh data akun
            kamu akan dihapus.
          </p>
          <form
            th:action="@{/auth/profil/hapus-akun}"
            method="post"
            onsubmit="
              return confirm(
                'Yakin ingin hapus akun? Tindakan ini tidak bisa dibatalkan.',
              );
            "
          >
            <button type="submit" class="btn btn-danger">
              Hapus Akun Saya
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
