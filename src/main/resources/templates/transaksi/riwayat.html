<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riwayat Transaksi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="navbar">
  <div class="brand"><h2>Keuangan Mahasiswa</h2></div>
  <div class="actions">
    <a th:href="@{/dashboard}">Dashboard</a>
    <a th:href="@{/transaksi/statistik}">Statistik</a>
    <a th:href="@{/auth/logout}">Logout</a>
  </div>
</div>
<div class="container">
  <a class="nav-back" th:href="@{/dashboard}">← Dashboard</a>
  <div class="page-title">Riwayat Transaksi</div>

  <div class="filter-bar">
    <span class="label">Periode:</span>
    <a th:href="@{/transaksi/riwayat(filter='semua')}"   th:classappend="${filter == 'semua'}   ? ' active' : ''">Semua</a>
    <a th:href="@{/transaksi/riwayat(filter='mingguan')}" th:classappend="${filter == 'mingguan'} ? ' active' : ''">7 Hari Terakhir</a>
    <a th:href="@{/transaksi/riwayat(filter='bulanan')}"  th:classappend="${filter == 'bulanan'}  ? ' active' : ''">Bulan Ini</a>
  </div>

  <div class="table-scroll">
  <table>
    <thead>
      <tr><th>Tanggal</th><th>Kategori</th><th>Keterangan</th><th>Jenis</th><th>Jumlah</th></tr>
    </thead>
    <tbody>
      <tr th:each="t : ${transaksiList}">
        <td th:text="${t.tanggal}">-</td>
        <td th:text="${t.kategori != null ? t.kategori : '-'}">-</td>
        <td th:text="${t.catatan != null ? t.catatan : '-'}">-</td>
        <td><span class="badge" th:classappend="${t.jenis.name()=='PEMASUKAN'}?'masuk':'keluar'" th:text="${t.jenis}">-</span></td>
        <td class="jumlah" th:classappend="${t.jenis.name()=='PEMASUKAN'}?'masuk':'keluar'"
            th:text="'Rp ' + ${#numbers.formatInteger(t.jumlah, 1, 'COMMA')}">-</td>
      </tr>
      <tr th:if="${#lists.isEmpty(transaksiList)}">
        <td colspan="5" class="empty">Tidak ada transaksi di periode ini</td>
      </tr>
    </tbody>
  </table>
  </div>
</div>
</body>
</html>
