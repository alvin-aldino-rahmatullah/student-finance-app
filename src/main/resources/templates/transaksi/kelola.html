<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kelola Transaksi</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="navbar">
  <div class="brand"><h2>Keuangan Mahasiswa</h2></div>
  <div class="actions">
    <a th:href="@{/dashboard}">Dashboard</a>
    <a th:href="@{/transaksi/statistik}">Statistik</a>
    <a th:href="@{/auth/logout}">Logout</a>
  </div>
</div>
<div class="container">
  <a class="nav-back" th:href="@{/dashboard}">← Dashboard</a>
  <div class="page-title">Kelola Transaksi</div>

  <div class="alert success" th:if="${sukses}" th:text="${sukses}"></div>
  <div class="alert error"   th:if="${error}"  th:text="${error}"></div>

  <!-- FORM TAMBAH -->
  <div class="card form-card">
    <h3>Tambah Transaksi Baru</h3>
    <form th:action="@{/transaksi/tambah}" method="post">
      <div class="form-grid">
        <div class="form-group">
          <label>Jenis</label>
          <select name="jenis" required>
            <option value="PEMASUKAN">Pemasukan</option>
            <option value="PENGELUARAN">Pengeluaran</option>
          </select>
        </div>
        <div class="form-group">
          <label>Jumlah (Rp)</label>
          <input type="number" name="jumlah" min="1" required placeholder="Contoh: 50000"/>
        </div>
        <div class="form-group">
          <label>Tanggal</label>
          <input type="date" name="tanggal" required th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
        </div>
        <div class="form-group">
          <label>Kategori</label>
          <select name="kategori">
            <option value="Makanan">Makanan</option>
            <option value="Transport">Transport</option>
            <option value="Pendidikan">Pendidikan</option>
            <option value="Kesehatan">Kesehatan</option>
            <option value="Hiburan">Hiburan</option>
            <option value="Kos/Tempat Tinggal">Kos/Tempat Tinggal</option>
            <option value="Beasiswa">Beasiswa</option>
            <option value="Kiriman Orang Tua">Kiriman Orang Tua</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>
        <div class="form-group span-2">
          <label>Catatan</label>
          <input type="text" name="catatan" placeholder="Keterangan transaksi..."/>
        </div>
      </div>
      <br/>
      <button type="submit" class="btn btn-primary">Tambah Transaksi</button>
    </form>
  </div>

  <!-- TABEL -->
  <div class="table-scroll">
  <table>
    <thead>
      <tr>
        <th>Tanggal</th>
        <th>Kategori</th>
        <th>Keterangan</th>
        <th>Jenis</th>
        <th>Jumlah</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="t : ${transaksiList}">
        <td th:text="${t.tanggal}">-</td>
        <td th:text="${t.kategori != null ? t.kategori : '-'}">-</td>
        <td th:text="${t.catatan != null ? t.catatan : '-'}">-</td>
        <td>
          <span class="badge"
                th:classappend="${t.jenis.name() == 'PEMASUKAN'} ? 'masuk' : 'keluar'"
                th:text="${t.jenis}">-</span>
        </td>
        <td class="jumlah"
            th:classappend="${t.jenis.name() == 'PEMASUKAN'} ? 'masuk' : 'keluar'"
            th:text="'Rp ' + ${#numbers.formatInteger(t.jumlah, 1, 'COMMA')}">-</td>
        <td>
          <form th:action="@{'/transaksi/hapus/' + ${t.id}}" method="post" style="display:inline"
                onsubmit="return confirm('Hapus transaksi ini?')">
            <button type="submit" class="btn btn-danger btn-sm">Hapus</button>
          </form>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(transaksiList)}">
        <td colspan="6" class="empty">Belum ada transaksi</td>
      </tr>
    </tbody>
  </table>
  </div>
</div>
</body>
</html>
