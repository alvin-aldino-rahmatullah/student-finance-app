<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manajemen Saldo</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="navbar">
  <div class="brand"><h2>Keuangan Mahasiswa</h2></div>
  <div class="actions">
    <a th:href="@{/dashboard}">Dashboard</a>
    <a th:href="@{/auth/logout}">Logout</a>
  </div>
</div>
<div class="container narrow">
  <a class="nav-back" th:href="@{/dashboard}">← Dashboard</a>
  <div class="page-title">Manajemen Saldo</div>

  <div class="alert success" th:if="${sukses}" th:text="${sukses}"></div>
  <div class="alert error"   th:if="${error}"  th:text="${error}"></div>

  <div class="saldo-box">
    <div class="label">Saldo Saat Ini</div>
    <div class="nilai" th:text="'Rp ' + ${#numbers.formatInteger(saldo, 1, 'COMMA')}">Rp 0</div>
  </div>

  <div class="card form-card">
    <h3>Tambah Saldo</h3>
    <form th:action="@{/saldo/tambah}" method="post">
      <div class="form-group">
        <label>Jumlah yang ingin ditambahkan (Rp)</label>
        <input type="number" name="jumlah" min="1000" step="1000"
               placeholder="Contoh: 500000" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Tambah Saldo</button>
    </form>
  </div>
</div>
</body>
</html>
